:root {
  --yellow:#FFCC00; --black:#1C1C1C; --charcoal:#333;
  --white:#F7F7F7; --card:#222; --border:#333; --muted:#666; --radius:12px;
}

* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
body { background:#1C1C1C; font-family:'Geom',sans-serif; font-weight:400; color:var(--white); min-height:100vh; overflow-x:hidden; }

.screen { display:none; flex-direction:column; min-height:100vh; }
.screen.active { display:flex; }

.app-header { background:rgba(28,28,28,0.98); border-bottom:2px solid var(--yellow); flex-shrink:0; position:sticky; top:0; z-index:50; }
.app-header-inner { display:flex; align-items:stretch; }
.header-logo-wrap { background:var(--yellow); padding:10px 14px; display:flex; align-items:center; }
.header-logo-wrap img { height:38px; filter:brightness(0); }
.header-title { padding:10px 14px; display:flex; flex-direction:column; justify-content:center; flex:1; }
.header-title h1 { font-weight:800; font-size:15px; letter-spacing:1px; text-transform:uppercase; color:var(--white); line-height:1; }
.header-title p { font-size:9px; color:var(--muted); letter-spacing:2px; text-transform:uppercase; margin-top:3px; }
.header-back { background:none; border:none; color:var(--yellow); font-family:'Geom',sans-serif; font-weight:800; font-size:13px; padding:10px 14px; cursor:pointer; display:none; letter-spacing:1px; text-transform:uppercase; }

.breadcrumb { padding:10px 16px; font-size:11px; color:var(--muted); letter-spacing:1px; background:#111; border-bottom:1px solid var(--border); flex-shrink:0; white-space:nowrap; overflow-x:auto; }
.breadcrumb span { color:var(--yellow); }

.list { flex:1; overflow-y:auto; padding:12px; }

.folder-item { display:flex; align-items:center; gap:12px; background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:14px 16px; margin-bottom:8px; cursor:pointer; transition:border-color 0.15s; -webkit-user-select:none; }
.folder-item:active { background:#2a2a2a; border-color:var(--yellow); }
.folder-icon { width:38px; height:38px; background:rgba(255,204,0,0.1); border-radius:8px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.folder-icon svg { width:20px; height:20px; }
.folder-info { flex:1; min-width:0; }
.folder-name { font-weight:800; font-size:14px; color:var(--white); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.folder-sub { font-size:11px; color:var(--muted); margin-top:2px; }
.folder-arrow { color:var(--muted); font-size:18px; flex-shrink:0; }

.visit-actions { flex:1; padding:16px; display:flex; flex-direction:column; gap:12px; }
.visit-info { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:16px; }
.visit-info-label { font-size:9px; letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin-bottom:4px; }
.visit-info-value { font-weight:800; font-size:14px; color:var(--white); }

.action-btn { display:flex; align-items:center; gap:16px; background:var(--card); border:1.5px solid rgba(255,204,0,0.4); border-radius:var(--radius); padding:18px 20px; cursor:pointer; transition:all 0.15s; -webkit-user-select:none; text-decoration:none; }
.action-btn:active { transform:scale(0.98); border-color:var(--yellow); background:#2a2a00; }
.action-icon { width:46px; height:46px; border-radius:10px; background:rgba(255,204,0,0.15); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.action-text h3 { font-weight:800; font-size:15px; color:var(--white); text-transform:uppercase; letter-spacing:0.5px; }
.action-text p { font-size:12px; color:var(--muted); margin-top:3px; }

.signin-screen { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:32px 24px; text-align:center; }
.signin-logo { width:80px; height:80px; background:var(--yellow); border-radius:20px; display:flex; align-items:center; justify-content:center; margin:0 auto 24px; }
.signin-logo img { width:56px; filter:brightness(0); }
.signin-screen h2 { font-weight:800; font-size:22px; letter-spacing:1px; text-transform:uppercase; color:var(--white); margin-bottom:8px; }
.signin-screen p { font-size:13px; color:var(--muted); line-height:1.6; margin-bottom:32px; max-width:280px; }
.signin-btn { display:flex; align-items:center; gap:12px; background:var(--yellow); color:var(--black); font-family:'Geom',sans-serif; font-weight:800; font-size:14px; letter-spacing:2px; text-transform:uppercase; border:none; border-radius:var(--radius); padding:16px 28px; cursor:pointer; }

.loading { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px; }
.spinner { width:36px; height:36px; border:3px solid var(--border); border-top-color:var(--yellow); border-radius:50%; animation:spin 0.8s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
.loading p { font-size:13px; color:var(--muted); letter-spacing:1px; }

#camera-screen { position:fixed; inset:0; background:#000; z-index:100; display:none; flex-direction:column; }
#camera-screen.active { display:flex; }
#camera-video { flex:1; object-fit:cover; width:100%; }
.camera-ui { position:absolute; inset:0; display:flex; flex-direction:column; justify-content:space-between; padding:40px 0 40px; }
.camera-top { display:flex; justify-content:flex-end; padding:0 20px; }
.camera-close { width:44px; height:44px; background:rgba(0,0,0,0.6); border:1.5px solid rgba(255,255,255,0.3); border-radius:50%; color:white; font-size:20px; display:flex; align-items:center; justify-content:center; cursor:pointer; }
.camera-bottom { display:flex; align-items:center; justify-content:center; padding:0 20px; }
.shutter-btn { width:72px; height:72px; background:white; border-radius:50%; border:4px solid rgba(255,255,255,0.4); cursor:pointer; display:flex; align-items:center; justify-content:center; -webkit-user-select:none; transition:transform 0.1s; }
.shutter-btn:active { transform:scale(0.92); }
.shutter-inner { width:58px; height:58px; background:white; border-radius:50%; }
.camera-count { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); background:rgba(0,0,0,0.7); color:var(--yellow); font-family:'Geom',sans-serif; font-weight:800; font-size:13px; letter-spacing:1px; padding:6px 14px; border-radius:20px; pointer-events:none; opacity:0; transition:opacity 0.3s; }
.camera-count.show { opacity:1; }
.camera-flash { position:absolute; inset:0; background:white; opacity:0; pointer-events:none; transition:opacity 0.1s; }
.camera-flash.flash { opacity:0.8; }
.photo-preview { position:absolute; bottom:110px; right:20px; width:56px; height:56px; border-radius:8px; border:2px solid var(--yellow); overflow:hidden; display:none; }
.photo-preview img { width:100%; height:100%; object-fit:cover; }

.toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(80px); background:#333; border:1px solid var(--yellow); color:var(--white); padding:10px 20px; border-radius:40px; font-size:13px; font-weight:800; transition:transform 0.3s; z-index:999; white-space:nowrap; }
.toast.show { transform:translateX(-50%) translateY(0); }
.empty { flex:1; display:flex; align-items:center; justify-content:center; padding:32px; }
.empty p { color:var(--muted); font-size:13px; text-align:center; }
</style>
</head>

<div class="screen active" id="screen-signin">

<script>
var CLIENT_ID   = '141942610755-8m6rjag9uqr7m8hiu90oqjki6rgvuvha.apps.googleusercontent.com';
var ROOT_FOLDER = '0AKNacU4cp3DZUk9PVA';
var ROW_URL     = 'https://script.google.com/macros/s/AKfycbzolmUgkjxPZghPGPRJG4f0ObyoMvEeTtx8SxSlTff8MmJnmW-znIE1QQOa5lRK-YNewQ/exec';
var REDIRECT    = 'https://ajws94.github.io/ajs-field/AJS_Field_App.html';
var SCOPE       = 'https://www.googleapis.com/auth/drive';

var state = { token:null, stack:[], currentVisit:null, photoFolderId:null, photoCount:0, cameraStream:null };

// ── OAUTH — use redirect flow instead of popup ────────────────
function signIn() {
  // Store current state in sessionStorage so we can restore after redirect
  sessionStorage.setItem('ajs_signing_in', '1');

  var authUrl = 'https://accounts.google.com/o/oauth2/v2/auth' +
    '?client_id=' + encodeURIComponent(CLIENT_ID) +
    '&redirect_uri=' + encodeURIComponent(REDIRECT) +
    '&response_type=token' +
    '&scope=' + encodeURIComponent(SCOPE) +
    '&prompt=select_account';

  window.location.href = authUrl;
}

// Check if we've just been redirected back with a token
function checkRedirectToken() {
  var hash = window.location.hash;
  if (!hash) return false;

  var params = {};
  hash.substring(1).split('&').forEach(function(pair) {
    var parts = pair.split('=');
    params[parts[0]] = decodeURIComponent(parts[1] || '');
  });

  if (params.access_token) {
    state.token = params.access_token;
    // Clean up URL
    history.replaceState(null, '', window.location.pathname + window.location.search);
    return true;
  }
  return false;
}

// On load — check for token in URL hash
window.addEventListener('load', function() {
  console.log('Page loaded');
  console.log('Full href:', window.location.href);
  console.log('Hash:', window.location.hash);
  console.log('Search:', window.location.search);
  if (checkRedirectToken()) {
    console.log('Token found:', state.token ? state.token.substring(0,20)+'...' : 'none');
    showScreen('screen-app');
    loadFolder(ROOT_FOLDER, 'Current Projects');
  } else {
    console.log('No token found in URL');
  }
});

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(function(s) { s.classList.remove('active'); });
  document.getElementById(id).classList.add('active');
}

function loadFolder(folderId, folderName) {
  state.stack.push({id:folderId, name:folderName});
  updateHeader();
  showLoading();

  var q = "'" + folderId + "' in parents and mimeType='application/vnd.google-apps.folder' and trashed=false";
  fetch('https://www.googleapis.com/drive/v3/files?q=' + encodeURIComponent(q) + '&orderBy=name&fields=files(id,name)&pageSize=200&supportsAllDrives=true&includeItemsFromAllDrives=true', {
    headers: {Authorization:'Bearer ' + state.token}
  })
  .then(function(r){return r.json();})
  .then(function(data) {
    console.log('Drive API response:', JSON.stringify(data));
    if (data.error) { showToast('Error: ' + data.error.message); console.error('Drive error:', data.error); return; }
    renderList(data.files || []);
  })
  .catch(function(err) { showToast('Connection error'); console.error('Fetch error:', err); });
}

function renderList(folders) {
  var container = document.getElementById('list-container');
  if (!folders.length) { container.innerHTML = '<div class="empty"><p>No folders found</p></div>'; return; }

  var isVisitLevel = folders.some(function(f) { return /^\d{2} \d{2}-\d{2}-\d{4}/.test(f.name); });
  if (isVisitLevel) { renderVisitList(folders); return; }

  container.innerHTML = folders.map(function(f) {
    var isPVD = f.name === '09 Post Visit Data' || f.name === '10 Post Visit Data';
    return '<div class="folder-item" onclick="loadFolder(\'' + f.id + '\',\'' + esc(f.name) + '\')">' +
      '<div class="folder-icon">' + (isPVD ? pvdIcon() : folderIcon()) + '</div>' +
      '<div class="folder-info"><div class="folder-name">' + h(f.name) + '</div></div>' +
      '<div class="folder-arrow">&#8250;</div></div>';
  }).join('');
}

function renderVisitList(folders) {
  document.getElementById('list-container').innerHTML = folders.map(function(f) {
    var p = parseVisit(f.name);
    return '<div class="folder-item" onclick="openVisit(\'' + f.id + '\',\'' + esc(f.name) + '\')">' +
      '<div class="folder-icon">' + visitIcon() + '</div>' +
      '<div class="folder-info"><div class="folder-name">' + h(f.name) + '</div>' +
      (p ? '<div class="folder-sub">' + p.date + (p.desc?' — '+p.desc:'') + '</div>' : '') +
      '</div><div class="folder-arrow">&#8250;</div></div>';
  }).join('');
}

function openVisit(id, name) {
  var parsed  = parseVisit(name);
  state.currentVisit = {
    id:      id, name:    name,
    jobNo:   getJobNo(), project: getProject(),
    date:    parsed ? parsed.date : '',
  };
  state.stack.push({id:id, name:name});
  state.photoFolderId = null;
  updateHeader();

  document.getElementById('list-container').innerHTML =
    '<div class="visit-actions">' +
    '<div class="visit-info">' +
      '<div class="visit-info-label">Visit Folder</div>' +
      '<div class="visit-info-value">' + h(name) + '</div>' +
    '</div>' +
    '<a class="action-btn" href="' + buildROW() + '" target="_blank">' +
      '<div class="action-icon">' + rowIcon() + '</div>' +
      '<div class="action-text"><h3>Record of Works</h3><p>Open and complete the site visit form</p></div>' +
    '</a>' +
    '<div class="action-btn" onclick="openCamera()">' +
      '<div class="action-icon">' + camIcon() + '</div>' +
      '<div class="action-text"><h3>Take Photos</h3><p>Save directly to this visit folder</p></div>' +
    '</div>' +
    '</div>';
}

function buildROW() {
  var v = state.currentVisit;
  return ROW_URL + '?jobno=' + enc(v.jobNo) + '&project=' + enc(v.project) + '&date=' + enc(v.date) + '&surveyor=Ashley%20Smith&folderId=' + enc(v.id) ;
}

function goBack() {
  if (state.stack.length <= 1) return;
  state.stack.pop();
  state.currentVisit = null;
  var prev = state.stack.pop();
  loadFolder(prev.id, prev.name);
}

function updateHeader() {
  var cur = state.stack[state.stack.length-1];
  document.getElementById('header-title').textContent = cur ? cur.name : 'Projects';
  document.getElementById('header-sub').textContent   = state.stack.length <= 1 ? 'Current Projects' : state.stack.map(function(s){return s.name;}).join(' › ');
  document.getElementById('back-btn').style.display   = state.stack.length > 1 ? 'block' : 'none';
  document.getElementById('breadcrumb').innerHTML     = state.stack.map(function(s,i) {
    return i === state.stack.length-1 ? '<span>'+h(s.name)+'</span>' : h(s.name);
  }).join(' › ');
}

function getJobNo() {
  for (var i=0;i<state.stack.length;i++) { var m=state.stack[i].name.match(/^(\d{2}-\d{4})/); if(m)return m[1]; }
  return '';
}
function getProject() {
  for (var i=0;i<state.stack.length;i++) { var m=state.stack[i].name.match(/^\d{2}-\d{4}\s+(.+?)(?:\s*\([^)]+\))?$/); if(m)return m[1].trim(); }
  return '';
}

// ── CAMERA ────────────────────────────────────────────────────
function openCamera() {
  state.photoCount = 0; state.photoFolderId = null;
  document.getElementById('camera-count').textContent = '0 photos';
  document.getElementById('camera-count').classList.remove('show');
  document.getElementById('photo-preview').style.display = 'none';
  document.getElementById('camera-screen').classList.add('active');
  navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'},audio:false})
    .then(function(stream) { state.cameraStream=stream; document.getElementById('camera-video').srcObject=stream; })
    .catch(function() { showToast('Camera access denied'); closeCamera(); });
}

function closeCamera() {
  if (state.cameraStream) { state.cameraStream.getTracks().forEach(function(t){t.stop();}); state.cameraStream=null; }
  document.getElementById('camera-screen').classList.remove('active');
  if (state.photoCount>0) showToast(state.photoCount+' photo'+(state.photoCount!==1?'s':'')+' saved');
}

function takePhoto() {
  var video=document.getElementById('camera-video');
  var c=document.createElement('canvas'); c.width=video.videoWidth; c.height=video.videoHeight;
  c.getContext('2d').drawImage(video,0,0);
  var flash=document.getElementById('camera-flash'); flash.classList.add('flash'); setTimeout(function(){flash.classList.remove('flash');},150);
  var dataUrl=c.toDataURL('image/jpeg',0.85);
  document.getElementById('preview-img').src=dataUrl; document.getElementById('photo-preview').style.display='block';
  c.toBlob(function(blob){uploadPhoto(blob);},'image/jpeg',0.85);
}

function uploadPhoto(blob) {
  var ts=new Date();
  var name='Photo_'+ts.getFullYear()+pad(ts.getMonth()+1)+pad(ts.getDate())+'_'+pad(ts.getHours())+pad(ts.getMinutes())+pad(ts.getSeconds())+'.jpg';
  ensurePhotosFolder(state.currentVisit.id, function(fid) {
    var meta=JSON.stringify({name:name,parents:[fid]});
    var form=new FormData();
    form.append('metadata',new Blob([meta],{type:'application/json'}));
    form.append('file',blob);
    fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&supportsAllDrives=true',{
      method:'POST', headers:{Authorization:'Bearer '+state.token}, body:form
    }).then(function(r){return r.json();}).then(function(d){
      if(d.id){state.photoCount++;var el=document.getElementById('camera-count');el.textContent=state.photoCount+' photo'+(state.photoCount!==1?'s':'')+' saved';el.classList.add('show');}
      else showToast('Upload failed');
    }).catch(function(){showToast('Upload error');});
  });
}

function ensurePhotosFolder(parentId, cb) {
  if (state.photoFolderId) { cb(state.photoFolderId); return; }
  var q=encodeURIComponent("'"+parentId+"' in parents and name='Photos' and mimeType='application/vnd.google-apps.folder' and trashed=false");
  fetch('https://www.googleapis.com/drive/v3/files?q='+q+'&fields=files(id)&supportsAllDrives=true&includeItemsFromAllDrives=true',{headers:{Authorization:'Bearer '+state.token}})
  .then(function(r){return r.json();}).then(function(d){
    if(d.files&&d.files.length>0){state.photoFolderId=d.files[0].id;cb(state.photoFolderId);}
    else{
      fetch('https://www.googleapis.com/drive/v3/files?supportsAllDrives=true',{method:'POST',headers:{Authorization:'Bearer '+state.token,'Content-Type':'application/json'},body:JSON.stringify({name:'Photos',mimeType:'application/vnd.google-apps.folder',parents:[parentId]})})
      .then(function(r){return r.json();}).then(function(f){state.photoFolderId=f.id;cb(f.id);});
    }
  });
}

function parseVisit(name) {
  var m=name.match(/^\d{2}\s+(\d{2}-\d{2}-\d{4})(?:\s+[A-Z]+)?(?:\s+(.+))?$/);
  return m ? {date:m[1],desc:m[2]||''} : null;
}

function showLoading() { document.getElementById('list-container').innerHTML='<div class="loading"><div class="spinner"></div><p>Loading...</p></div>'; }
function showToast(msg) { var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},3000); }
function h(s)   { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function esc(s) { return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }
function enc(s) { return encodeURIComponent(s||''); }
function pad(n) { return n<10?'0'+n:String(n); }

function folderIcon() { return '<svg viewBox="0 0 24 24" fill="none" stroke="#FFCC00" stroke-width="1.5"><path d="M3 7a2 2 0 012-2h4l2 2h8a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V7z"/></svg>'; }
function pvdIcon()    { return '<svg viewBox="0 0 24 24" fill="#FFCC00" stroke="#FFCC00" stroke-width="1.5"><path d="M3 7a2 2 0 012-2h4l2 2h8a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V7z"/></svg>'; }
function visitIcon()  { return '<svg viewBox="0 0 24 24" fill="none" stroke="#FFCC00" stroke-width="1.5"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M8 2v4M16 2v4M3 10h18"/></svg>'; }
function rowIcon()    { return '<svg viewBox="0 0 24 24" fill="none" stroke="#FFCC00" stroke-width="1.5"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/></svg>'; }
function camIcon()    { return '<svg viewBox="0 0 24 24" fill="none" stroke="#FFCC00" stroke-width="1.5"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>'; }
</script>
